<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fenix Vision</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #f8fafc;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 24px;
    }

    main {
      max-width: 720px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 1rem;
      letter-spacing: 0.04em;
    }

    p {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main>
    <h1>Fenix Vision</h1>
    <p>This website is currently under construction.</p>
  </main>
</body>
</html>
